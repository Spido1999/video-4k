name: 🎬 Video Upscaler

on:
  push:
    paths:
      - 'input/*.mp4'
      - 'input/*.MP4'

jobs:
  upscale:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install FFmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg

      - name: Find input video
        id: find_video
        run: |
          VIDEO=$(ls input/*.mp4 input/*.MP4 2>/dev/null | head -1)
          if [ -z "$VIDEO" ]; then
            echo "❌ No .mp4 file found in input/ folder"
            exit 1
          fi
          echo "Found: $VIDEO"
          echo "video_path=$VIDEO" >> $GITHUB_OUTPUT
          echo "video_name=$(basename $VIDEO .mp4)" >> $GITHUB_OUTPUT

      - name: Detect resolution setting
        id: resolution
        run: |
          if [ -f "input/4k.txt" ]; then
            echo "target=4k"  >> $GITHUB_OUTPUT
            echo "scale=3840" >> $GITHUB_OUTPUT
            echo "🎯 Target: 4K"
          else
            echo "target=2k"  >> $GITHUB_OUTPUT
            echo "scale=2560" >> $GITHUB_OUTPUT
            echo "🎯 Target: 2K"
          fi

      - name: Upscale video (aspect ratio preserved)
        run: |
          mkdir -p output

          INPUT="${{ steps.find_video.outputs.video_path }}"
          OUTPUT="output/${{ steps.find_video.outputs.video_name }}_${{ steps.resolution.outputs.target }}.mp4"
          SCALE="${{ steps.resolution.outputs.scale }}"

          # Detect portrait vs landscape
          VID_W=$(ffprobe -v error -select_streams v:0 \
            -show_entries stream=width -of csv=p=0 "$INPUT")
          VID_H=$(ffprobe -v error -select_streams v:0 \
            -show_entries stream=height -of csv=p=0 "$INPUT")

          echo "📹 Input:  $INPUT  (${VID_W}x${VID_H})"

          if [ "$VID_H" -gt "$VID_W" ]; then
            echo "📱 Portrait / YouTube Shorts — scaling by height, width auto"
            VF="scale=-2:${SCALE}:flags=lanczos,unsharp=5:5:1.5:5:5:0.0"
          else
            echo "🖥️ Landscape — scaling by width, height auto"
            VF="scale=${SCALE}:-2:flags=lanczos,unsharp=5:5:1.5:5:5:0.0"
          fi

          ffmpeg -y \
            -i "$INPUT" \
            -vf "$VF" \
            -c:v libx264 \
            -crf 18 \
            -preset fast \
            -c:a copy \
            "$OUTPUT"

          FINAL_W=$(ffprobe -v error -select_streams v:0 \
            -show_entries stream=width -of csv=p=0 "$OUTPUT")
          FINAL_H=$(ffprobe -v error -select_streams v:0 \
            -show_entries stream=height -of csv=p=0 "$OUTPUT")

          echo "✅ Done! Output: ${FINAL_W}x${FINAL_H}"
          ls -lh output/

      - name: Upload upscaled video
        uses: actions/upload-artifact@v4
        with:
          name: upscaled-${{ steps.find_video.outputs.video_name }}-${{ steps.resolution.outputs.target }}
          path: output/
          retention-days: 7
